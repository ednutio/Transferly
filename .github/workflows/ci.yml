name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            bot/package-lock.json
            miniapp/package-lock.json

      - name: Install API dependencies
        run: npm ci
        working-directory: api

      - name: Install bot dependencies
        run: npm ci
        working-directory: bot

      - name: Install miniapp dependencies
        run: npm ci
        working-directory: miniapp

      - name: Lint API
        run: npm run lint --prefix api

      - name: Test API
        run: npm test --prefix api

      - name: Test bot
        run: npm test --prefix bot

      - name: Build miniapp
        run: npm run build --prefix miniapp
